# ══════════════════════════════════════════════════════════════
# Portfolio Agent — Konfiguracija strategije
# Verzija: 1.1 — Core+Satellite (2026-05-05)
# ══════════════════════════════════════════════════════════════
#
# Filozofija: Core+Satellite
#   CORE (90%): Boglehead ETF logika — pasivno, diversificirano,
#               dugoročno. Ne diraj osim godišnjeg rebalansiranja.
#   SATELLITE (5%): Motley Fool high-conviction picks — aktivni
#                   play na specifične mega-trendove. Max 3 pozicije,
#                   samo ★★★ konvikcija iz Gajine analize.
#   CASH (5%): Automatski ostatak do 1.0. Min rezerva za DCA i
#              rebalansiranje.
#
# Core je smanjen razmjerno (95% → 90%, scale 0.947) da oslobodi
# prostor za satelite bez narušavanja relativnih omjera ETFova.
# ══════════════════════════════════════════════════════════════

portfolio:
  name: "Moj Portfolio"
  base_currency: USD
  benchmark: SPY # S&P 500 ETF kao referentni indeks

# ──────────────────────────────────────────────────────────────
# Ciljna alokacija imovine
# Zbroj mora biti < 1.0 — ostatak je CASH (cilj: 5%)
# ──────────────────────────────────────────────────────────────
allocation:
  targets:
    # ── CORE (90%) — Boglehead pasivna strategija ────────────
    VTI:  0.33 # Vanguard Total Stock Market ETF (US) — sidro portfelja
    VXUS: 0.24 # Vanguard Total International Stock ETF — globalna diverzifikacija
    BND:  0.19 # Vanguard Total Bond Market ETF — stabilizirajući element
    BNDX: 0.09 # Vanguard Total International Bond ETF — valutna diverzifikacija
    GLD:  0.05 # SPDR Gold Shares — inflacijska zaštita i kriza hedge

    # ── SATELLITE (5%) — MF High-Conviction, ★★★ tier ───────
    # Izvor: Gaia analiza 10 Motley Fool dokumenata (2026-05-05)
    # Pravilo: max 3 pozicije, samo ★★★ konvikcija.
    # Pratiti kvartalno — ulaz/izlaz odlučuje Mirko.
    NVDA: 0.02 # NVIDIA — GPU/AI computing; ★★★
    EME:  0.02 # EMCOR Group — AI infra construction; ★★★
    ZS:   0.01 # Zscaler — zero-trust cybersecurity; ★ "Next Magnificent 7"

    # CASH = 1.0 - 0.95 = 0.05 (automatski)

# ──────────────────────────────────────────────────────────────
# Rebalansiranje
# ──────────────────────────────────────────────────────────────
rebalancing:
  threshold_pct: 5.0 # Rebalansiraj kad pozicija odstupa >5% od cilja
  frequency: monthly # Provjera: daily | weekly | monthly
  method: threshold # threshold | calendar | hybrid
  day_of_month: 1 # Za monthly: koji dan u mjesecu

# ──────────────────────────────────────────────────────────────
# Dollar-Cost Averaging (DCA)
# ──────────────────────────────────────────────────────────────
dca:
  enabled: true
  amount: 200.0 # Iznos po ciklusu ($)
  frequency: weekly # daily | weekly | biweekly | monthly
  day: monday # Za weekly: koji dan
  distribute_by: target # target (prema ciljnoj alokaciji) | equal | underweight

# ──────────────────────────────────────────────────────────────
# Upravljanje rizikom
# ──────────────────────────────────────────────────────────────
risk:
  max_daily_loss_pct: 3.0 # Pauziraj sve ako dnevni gubitak > 3%
  max_drawdown_pct: 15.0 # Zaustavi sve ako portfelj padne 15% od vrha
  max_position_pct: 40.0 # Max 40% portfelja u jednoj poziciji
  circuit_breaker_vix: 35.0 # Pauza kupnje ako VIX > 35
  min_cash_reserve_pct: 2.0 # Uvijek drži min 2% u cashu (5% je cash_target u allocation)
  max_orders_per_day: 100 # Max 10 naloga dnevno
  order_type: limit # limit | market (uvijek koristiti limit)
  limit_offset_pct: 0.1 # Limit cijena = tržišna +/- 0.1%

# ──────────────────────────────────────────────────────────────
# Obavijesti
# ──────────────────────────────────────────────────────────────
notifications:
  telegram:
    enabled: false # Postaviti na true kad se konfigurira bot
    chat_id: ""
    bot_token: "" # NIKAD commitati u git!
  daily_summary: true
  trade_alerts: true
  risk_alerts: true
  weekly_report: true

# ──────────────────────────────────────────────────────────────
# Data Engine postavke
# ──────────────────────────────────────────────────────────────
data:
  provider: alpaca # alpaca | yahoo (fallback)
  history_days: 365 # Koliko dana historije dohvatiti pri inicijalizaciji
  snapshot_interval_sec: 60 # Koliko često dohvatiti snapshot portfelja
  store_path: "./data/market.db" # Putanja do SQLite baze

# ──────────────────────────────────────────────────────────────
# Broker postavke
# ──────────────────────────────────────────────────────────────
broker:
  provider: alpaca
  paper_trading: true # TRUE = paper trading, FALSE = live
  base_url: "https://paper-api.alpaca.markets" # Paper trading URL
